<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Food Details - Community Kitchen Café</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <nav class="container">
      <div class="brand">
        <img src="images/Community Kitchen Cafe logo design (1).png" alt="Community Kitchen Café Logo" class="brand-logo" />
        <div class="brand-text">
          <span class="brand-name">Community Kitchen Café</span>
          <span class="brand-sub">Food with a Purpose</span>
        </div>
      </div>

      <div class="nav-actions">
        <a class="btn" href="index.html">Back to Menu</a>
      </div>
    </nav>
  </header>

  <section class="container" style="padding-top:40px;padding-bottom:60px;">
    <div class="panel" id="foodDetailBox">
      <p>Loading food details...</p>
    </div>
  </section>

  <script>
    const API_BASE = "https://cafe-4nv2.onrender.com";
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    function escapeHtml(str) {
      return String(str || "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    async function fetchJSON(url) {
      const res = await fetch(url);
      const text = await res.text();
      let json = {};
      try { json = text ? JSON.parse(text) : {}; } catch {}
      if (!res.ok) throw new Error(json.error || text || "Request failed");
      return json;
    }

    async function loadFoodDetails() {
      try {
        const json = await fetchJSON(API_BASE + "/api/menu");
        const items = json.items || [];
        const item = items.find(x => x._id === id);

        if (!item) {
          document.getElementById("foodDetailBox").innerHTML = "<p>Food item not found.</p>";
          return;
        }

        document.getElementById("foodDetailBox").innerHTML = `
          <div class="food-detail-layout">
            <div>
              <img src="${item.image || 'https://via.placeholder.com/800x600?text=Food'}"
                   alt="${escapeHtml(item.name)}"
                   class="food-detail-image">
            </div>

            <div>
              <div class="meta">${escapeHtml(item.category)}</div>
              <h1 style="margin-bottom:10px;">${escapeHtml(item.name)}</h1>
              <p class="desc">${escapeHtml(item.description || "")}</p>
              <div class="price" style="margin-bottom:18px;">$${Number(item.price || 0).toFixed(2)}</div>

              <div class="panel" style="margin-top:0;">
                <h3>Ingredients</h3>
                <p>${(item.ingredients || []).length ? item.ingredients.map(escapeHtml).join(", ") : "Not listed yet"}</p>
              </div>

              <div class="panel">
                <h3>Nutrition</h3>
                <p><strong>Calories:</strong> ${item.calories || "N/A"}</p>
                <p><strong>Protein:</strong> ${escapeHtml(item.nutrition?.protein || "N/A")}</p>
                <p><strong>Carbs:</strong> ${escapeHtml(item.nutrition?.carbs || "N/A")}</p>
                <p><strong>Fat:</strong> ${escapeHtml(item.nutrition?.fat || "N/A")}</p>
                <p><strong>Sodium:</strong> ${escapeHtml(item.nutrition?.sodium || "N/A")}</p>
              </div>

              <div class="panel">
                <h3>Allergy Info</h3>
                <p>${(item.allergens || []).length ? item.allergens.map(escapeHtml).join(", ") : "No allergy information listed"}</p>
              </div>
            </div>
          </div>
        `;
      } catch (err) {
        document.getElementById("foodDetailBox").innerHTML = "<p>Failed to load details.</p>";
      }
    }

    loadFoodDetails();
  </script>
</body>
</html>
